name: Run AI Insurance Distribution Research
on:
  workflow_dispatch:
jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout AutoResearchClaw
        uses: actions/checkout@v4
        with:
          repository: aiming-lab/AutoResearchClaw
          ref: main
      - name: Copy our config into the repo
        uses: actions/checkout@v4
        with:
          path: myconfig
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .
      - name: Run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cp myconfig/config.arc.yaml config.arc.yaml
          source .venv/bin/activate
          researchclaw run --config config.arc.yaml --auto-approve
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-paper
          path: artifacts/
          retention-days: 30
