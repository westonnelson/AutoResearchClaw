name: Run AI Insurance Distribution Research
on:
  workflow_dispatch:
    inputs:
      auto_approve:
        description: 'Skip human review gates?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'
jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout AutoResearchClaw
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install AutoResearchClaw
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e .
      - name: Run AutoResearchClaw
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p arc
          cp config.arc.yaml arc/config.arc.yaml
          source .venv/bin/activate
          researchclaw run --config config.arc.yaml --auto-approve
      - name: Zip output
        if: always()
        run: |
          zip -r research-output.zip artifacts/ || echo "no artifacts yet"
      - name: Upload paper
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: insurance-distribution-research-paper
          path: research-output.zip
          retention-days: 3
